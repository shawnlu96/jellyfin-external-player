name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --noconsole `
            --name JellyfinExternalPlayer `
            --icon src/icon.ico `
            --add-data "src/icon.ico;." `
            src/helper.py

      - name: Stage release artifacts
        run: |
          New-Item -ItemType Directory -Force release
          Copy-Item dist/JellyfinExternalPlayer.exe release/
          Copy-Item src/userscript.user.js release/jellyfin-external-player.user.js
          Copy-Item README.md release/

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: |
            release/JellyfinExternalPlayer.exe
            release/jellyfin-external-player.user.js
          generate_release_notes: true
